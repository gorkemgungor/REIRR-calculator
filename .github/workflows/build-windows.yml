name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ── Windows ──────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install "PyQt6==6.11.0" "openpyxl==3.1.5" "reportlab==4.4.10" "lxml==6.0.4" pyinstaller pillow

      - name: Convert PNG icon to ICO
        run: |
          python -c "
          from PIL import Image
          img = Image.open('icon_source.png').convert('RGBA')
          img.save('icon.ico', sizes=[(16,16),(32,32),(48,48),(64,64),(128,128),(256,256)])
          "

      - name: Build EXE with PyInstaller
        run: pyinstaller LQCalculator-windows.spec

      - name: Download VC++ Redistributable
        run: |
          curl -L -o vc_redist.x64.exe `
            "https://aka.ms/vs/17/release/vc_redist.x64.exe"

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build Windows Installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: REIR-Calculator-Windows
          path: Output/REIR-Calculator-Setup-Windows.exe

  # ── macOS ─────────────────────────────────────────────────────
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install "PyQt6==6.11.0" "openpyxl==3.1.5" "reportlab==4.4.10" "lxml==6.0.4" pyinstaller

      - name: Build .app with PyInstaller
        run: pyinstaller LQCalculator.spec

      - name: Create DMG
        run: |
          mkdir -p dmg_staging
          cp -R "dist/REIR Calculator.app" dmg_staging/
          ln -s /Applications dmg_staging/Applications
          hdiutil create \
            -volname "REIR Calculator" \
            -srcfolder dmg_staging \
            -ov \
            -format UDZO \
            "REIR-Calculator-Mac.dmg"

      - name: Upload Mac DMG
        uses: actions/upload-artifact@v4
        with:
          name: REIR-Calculator-Mac
          path: REIR-Calculator-Mac.dmg

  # ── GitHub Release ────────────────────────────────────────────
  release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: REIR-Calculator-Windows

      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: REIR-Calculator-Mac

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: REIR Calculator ${{ github.ref_name }}
          body: |
            ## REIR Calculator ${{ github.ref_name }}

            ### Installation
            - **Windows 10/11**: `REIR-Calculator-Setup-Windows.exe` dosyasını indirip çalıştırın. Gerekirse Visual C++ Runtime otomatik kurulur.
            - **macOS**: `REIR-Calculator-Mac.dmg` dosyasını indirin, açın ve uygulamayı Applications klasörüne sürükleyin.
          files: |
            REIR-Calculator-Setup-Windows.exe
            REIR-Calculator-Mac.dmg
