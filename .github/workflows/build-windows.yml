name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install PyQt6 openpyxl reportlab pyinstaller

      - name: Build EXE
        run: |
          pyinstaller LQCalculator-windows.spec

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: REIR-Calculator-Windows
          path: dist/REIR Calculator/
          retention-days: 30
